version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/query.sql"
    schema: "sql/migrations/"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/adapters/repository/sqlcgen"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
