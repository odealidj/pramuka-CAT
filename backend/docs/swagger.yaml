      summary: Hapus User (Soft-Delete)
      tags:
      - Admin - User
    get:
      description: Mengambil data detail satu pengguna berdasarkan ID
      parameters:
      - description: UUID User
        in: path
        name: id
        required: true
        type: string
      produces:
