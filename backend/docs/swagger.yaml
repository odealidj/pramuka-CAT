      consumes:
      - application/json
      description: Admin memperbarui data profil pengguna
      parameters:
      - description: UUID User
        in: path
        name: id
        required: true
        type: string
      - description: Data yang diperbarui
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update Data User
      tags:
      - Admin - User
  /admin/users/{id}/password:
    put:
      consumes:
      - application/json
      description: Admin mengubah kata sandi pengguna
      parameters:
      - description: UUID User
        in: path
        name: id
        required: true
        type: string
      - description: Password Baru
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UpdateUserPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update Password User
      tags:
      - Admin - User
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentikasi pengguna dan mendapatkan Access Token & Refresh Token
      parameters:
      - description: Kredensial Login
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.LoginResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Memperbarui Access Token menggunakan Refresh Token yang masih berlaku
      parameters:
      - description: Refresh Token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.RefreshRequest'
      produces:
      - application/json
      responses:
