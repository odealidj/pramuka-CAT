        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Buat User Baru
      tags:
      - Admin - User
  /admin/users/{id}:
