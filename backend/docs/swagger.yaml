basePath: /api/v1
definitions:
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Category:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.CreateCategoryRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.CreateEventRequest:
    properties:
      duration_minutes:
        minimum: 1
        type: integer
      end_time:
        type: string
      name:
        type: string
      passing_grade:
        maximum: 100
        minimum: 0
        type: number
      start_time:
        type: string
    required:
    - duration_minutes
    - end_time
    - name
    - passing_grade
    - start_time
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.CreateQuestionRequest:
    properties:
      category_id:
        type: integer
      correct_answer:
        enum:
        - A
        - B
        - C
        - D
        type: string
      option_a:
        type: string
      option_b:
        type: string
      option_c:
        type: string
      option_d:
        type: string
      question_text:
        type: string
      weight:
        minimum: 1
        type: integer
    required:
    - correct_answer
    - option_a
    - option_b
    - option_c
    - option_d
    - question_text
    - weight
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.CreateUserRequest:
    properties:
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      photo_url:
        type: string
      role:
        enum:
        - admin
        - peserta
        type: string
      username:
        type: string
    required:
    - full_name
    - password
    - role
    - username
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.EnrollEventRequest:
    properties:
      event_id:
        type: string
    required:
    - event_id
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Event:
    properties:
      created_at:
        type: string
      duration_minutes:
        type: integer
      end_time:
        type: string
      id:
        type: string
      name:
        type: string
      passing_grade:
        type: number
      start_time:
        type: string
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UserResponse'
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Question:
    properties:
      category_id:
        type: integer
      correct_answer:
        type: string
      created_at:
        type: string
      id:
        type: string
      option_a:
        type: string
      option_b:
        type: string
      option_c:
        type: string
      option_d:
        type: string
      question_text:
        type: string
      weight:
        type: integer
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.RefreshResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UpcomingEvent:
    properties:
      duration_minutes:
        type: integer
      end_time:
        type: string
      id:
        type: string
      name:
        type: string
      passing_grade:
        type: number
      start_time:
        type: string
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UpdateCategoryRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UpdateQuestionRequest:
    properties:
      category_id:
        type: integer
      correct_answer:
        enum:
        - A
        - B
        - C
        - D
        type: string
      option_a:
        type: string
      option_b:
        type: string
      option_c:
        type: string
      option_d:
        type: string
      question_text:
        type: string
      weight:
        minimum: 1
        type: integer
    required:
    - correct_answer
    - option_a
    - option_b
    - option_c
    - option_d
    - question_text
    - weight
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UpdateUserPasswordRequest:
    properties:
      password:
        minLength: 6
        type: string
    required:
    - password
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UpdateUserRequest:
    properties:
      full_name:
        type: string
      photo_url:
        type: string
      role:
        enum:
        - admin
        - peserta
        type: string
      username:
        type: string
    required:
    - full_name
    - role
    - username
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.User:
    properties:
      created_at:
        type: string
      full_name:
        type: string
      id:
        type: string
      photo_url:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UserApproval:
    properties:
      approval_id:
        type: string
      completed_at:
        type: string
      duration_minutes:
        type: integer
      end_time:
        type: string
      event_id:
        type: string
      is_completed:
        type: boolean
      is_passed:
        type: boolean
      name:
        type: string
      passing_grade:
        type: number
      score:
        type: number
      start_time:
        type: string
      started_at:
        type: string
      status:
        description: pending, approved, revoked
        type: string
    type: object
  github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UserResponse:
    properties:
      full_name:
        type: string
      id:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  github_com_odealidj_pramuka-CAT_backend_pkg_response.ErrorDetail:
    properties:
      field:
        type: string
      message:
        type: string
    type: object
  github_com_odealidj_pramuka-CAT_backend_pkg_response.ErrorResponse:
    properties:
      code:
        example: 400
        type: integer
      errors:
        items:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.ErrorDetail'
        type: array
      message:
        example: Terjadi kesalahan
        type: string
      success:
        example: false
        type: boolean
    type: object
  github_com_odealidj_pramuka-CAT_backend_pkg_response.Meta:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total_pages:
        type: integer
      total_records:
        type: integer
    type: object
  github_com_odealidj_pramuka-CAT_backend_pkg_response.PaginatedResponse:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      message:
        type: string
      meta:
        $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.Meta'
      success:
        example: true
        type: boolean
    type: object
  github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      message:
        example: Operasi berhasil
        type: string
      success:
        example: true
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    name: Dev Team Pramuka CAT
    url: https://github.com/odealidj/pramuka-CAT
  description: REST API untuk platform Computer Assisted Test (CAT) Pramuka.
  termsOfService: http://swagger.io/terms/
  title: Pramuka CAT API
  version: "1.0"
paths:
  /admin/categories:
    get:
      parameters:
      - description: Halaman
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Category'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Daftar Kategori Soal
      tags:
      - Admin - Kategori
    post:
      consumes:
      - application/json
      parameters:
      - description: Nama Kategori
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Category'
              type: object
      security:
      - BearerAuth: []
      summary: Buat Kategori Soal
      tags:
      - Admin - Kategori
  /admin/categories/{id}:
    delete:
      parameters:
      - description: ID Kategori
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Hapus Kategori Soal
      tags:
      - Admin - Kategori
    put:
      consumes:
      - application/json
      parameters:
      - description: ID Kategori
        in: path
        name: id
        required: true
        type: integer
      - description: Nama Baru
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Category'
              type: object
      security:
      - BearerAuth: []
      summary: Update Kategori Soal
      tags:
      - Admin - Kategori
  /admin/events:
    get:
      parameters:
      - description: Halaman
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Event'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Daftar Event Ujian
      tags:
      - Admin - Event
    post:
      consumes:
      - application/json
      parameters:
      - description: Data Event
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.CreateEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Event'
              type: object
      security:
      - BearerAuth: []
      summary: Buat Event Ujian
      tags:
      - Admin - Event
  /admin/events/{id}/export:
    get:
      description: Download rekap nilai peserta dalam format Excel (.xlsx) atau PDF
      parameters:
      - description: UUID Event
        in: path
        name: id
        required: true
        type: string
      - description: 'Format file: excel (default) atau pdf'
        in: query
        name: format
        type: string
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Export Laporan Peserta
      tags:
      - Admin - Event
  /admin/questions:
    get:
      parameters:
      - description: Halaman
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Question'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Daftar Soal
      tags:
      - Admin - Bank Soal
    post:
      consumes:
      - application/json
      parameters:
      - description: Data Soal
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.CreateQuestionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Question'
              type: object
      security:
      - BearerAuth: []
      summary: Buat Soal Baru
      tags:
      - Admin - Bank Soal
  /admin/questions/{id}:
    delete:
      parameters:
      - description: UUID Soal
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Hapus Soal
      tags:
      - Admin - Bank Soal
    get:
      parameters:
      - description: UUID Soal
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Question'
              type: object
      security:
      - BearerAuth: []
      summary: Detail Soal
      tags:
      - Admin - Bank Soal
    put:
      consumes:
      - application/json
      parameters:
      - description: UUID Soal
        in: path
        name: id
        required: true
        type: string
      - description: Data Soal Baru
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.UpdateQuestionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.Question'
              type: object
      security:
      - BearerAuth: []
      summary: Update Soal
      tags:
      - Admin - Bank Soal
  /admin/users:
    get:
      description: Mengambil daftar seluruh pengguna dengan paginasi
      parameters:
      - description: 'Halaman (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Jumlah per halaman (default: 10)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_pkg_response.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_odealidj_pramuka-CAT_backend_internal_core_domain.User'
                  type: array
              type: object
