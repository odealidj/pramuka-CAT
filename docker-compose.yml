version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pramukacat_postgres
    environment:
      POSTGRES_USER: POSTGRES_USER
      POSTGRES_PASSWORD: POSTGRES_PASSWORD
      POSTGRES_DB: pramukacat
    ports:
      - "5432:5432"
    volumes:
      - pramukacat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U POSTGRES_USER -d pramukacat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pramukacat_redis
    ports:
      - "6379:6379"
    volumes:
      - pramukacat_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    container_name: pramukacat_migrate
    volumes:
      - ./backend/sql/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://POSTGRES_USER:POSTGRES_PASSWORD@postgres:5432/pramukacat?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pramukacat_api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - APP_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=POSTGRES_USER
      - POSTGRES_PASSWORD=POSTGRES_PASSWORD
      - POSTGRES_DB=pramukacat
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=supersecretaccess
      - JWT_REFRESH_SECRET=supersecretrefresh
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pramukacat_pgdata:
  pramukacat_redisdata:
